<ion-header>
  <ion-toolbar color="primary">
    <ion-title>
      Categorías
    </ion-title>
  </ion-toolbar>
</ion-header>

<ion-content>
  <ion-list>
    @if (categoryService.allCategories.length == 0) {
    <div style="text-align: center;">
      <ion-text color="primary">
        <h3>No hay categorias. ¡Crea la primera!</h3>
      </ion-text>
      <ion-button shape="round">
        <ion-icon slot="start" name="add-circle-outline"></ion-icon>
        Crear
      </ion-button>
    </div>
    } @else {
    @for(category of categoryService.allCategories; track category.id){
    <ion-item-sliding>
      <ion-item>
        <ion-label>
          <h2>{{category.title}}</h2>
        </ion-label>
      </ion-item>
      <ion-item-options side="end">
        <ion-item-option color="primary" (click)="edit(category)">
          <ion-icon name="create"></ion-icon>
        </ion-item-option>
        <ion-item-option color="danger" (click)="deleteById(category.id)">
          <ion-icon name="trash"></ion-icon>
        </ion-item-option>
      </ion-item-options>
    </ion-item-sliding>
    }
    }
  </ion-list>
  <ion-fab vertical="bottom" horizontal="end" slot="fixed">
    <ion-fab-button (click)="false">
      <ion-icon name="add">
      </ion-icon>
    </ion-fab-button>
  </ion-fab>
</ion-content>
